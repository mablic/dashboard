{% block checkTable %}
{% load static %}

<div class="container">
  <div class="row">
    <div class="col-sm-8">
    </div>
    <div class="col-sm-4 d-flex justify-content-end">
      <button id="addRecordBtn" class="btn btn-outline-success rounded-5" onclick="add_table_record()">Add Record</button>
      <button id="exportBtn" class="btn btn-outline-success rounded-5">Export to Excel</button>
    </div>
  </div>
  <div class="b-divider-section">
  </div>
  <div class="tableContainer">
    <table id="studyTable" class="table table-striped" style="width:100%">
        <thead>
            <tr>
                <th>Study Date</th>
                <th>Study Topic</th>
                <th>Study Time(mins)</th>
            </tr>
        </thead>
    </table>
  </div>

  <!-- Modal -->
  <div class="modal fade" id="editModal" aria-labelledby="exampleModalLabel" aria-hidden="true" data-bs-backdrop="static">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h1 class="modal-title fs-5" id="exampleModalLabel">Edit</h1>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <!-- Form to edit study details -->
          <form id="editForm">
            <!-- <div style="display: none;" id="objectId"></div> -->
            <div class="form-group">
              <label for="studyDate">Study Date</label>
              <input type="date" class="form-control" oldValue="" id="inputStudyDate" name="studyDate" required>
            </div>
            <div class="form-group">
              <label for="studyTopic">Study Topic</label>
              <input type="text" class="form-control" oldValue="" id="inputStudyTopic" name="studyTopic" required>
            </div>
            <div class="form-group">
              <label for="studyTime">Study Time (mins)</label>
              <input type="number" class="form-control" oldValue="" id="inputStudyTime" name="studyTime" min="0" max="720" step='0.01' required>
              <small class="invalid-input-note" style="color: red;">Please enter a value between 0 and 720.</small>
            </div>
            <div class="modal-footer">
              <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Close</button>
              <button type="button submit" class="btn btn-outline-success" id="saveChangesBtn" onclick="save_tracker_record()">Save changes</button>
              <button type="button" class="btn btn-outline-danger" id="deleteBtn" onclick="delete_tracker_record()">Delete</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>

<script type="text/javascript" src="{% static 'tracker/js/trackerTable.js' %}"></script>
{% endblock %}
